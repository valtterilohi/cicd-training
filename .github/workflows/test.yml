name: CI/CD Pipeline

on: [push]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Hae koodi
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Asenna Playwright ja testityökalut
        run: |
          pip install pytest-playwright
          playwright install chromium

      - name: Aja testit
        run: pytest test_site.py

  deploy:
    needs: test  # TÄMÄ ON TÄRKEÄ: Julkaisu odottaa testin onnistumista!
    runs-on: ubuntu-latest
    steps:
      - name: Hae koodi
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4